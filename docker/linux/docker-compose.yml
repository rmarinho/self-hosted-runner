version: '3.8'

services:
  runner:
    build: .
    image: youssefbrr/github-actions:latest # You can use this image or build your own
    restart: always
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "pgrep", "-f", "run.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M